spring.application.name=backend

spring.kafka.bootstrap-servers=localhost:9092

# All instances of this app that share the same group coordinate partition assignment.
spring.kafka.consumer.group-id=asset-tracker-backend

# When the group has NO committed offset for this topic-partition:
# - latest: only see records produced AFTER this consumer starts (typical first-time demo).
# - earliest: replay from the beginning of the retention window (good for "rebuild state from log").
spring.kafka.consumer.auto-offset-reset=latest

# Wire format: key is UTF-8 string (your producer's droneId), value is JSON (TELEMETRY.md).
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# JsonDeserializer needs a default Java type for the value bytes (no type headers in your Python JSON).
spring.kafka.consumer.properties.spring.json.value.default.type=com.assettracker.backend.telemetry.TelemetryEvent

# Security: only deserialize JSON into classes under this package (not arbitrary attacker types).
spring.kafka.consumer.properties.spring.json.trusted.packages=com.assettracker.backend.telemetry

# §4 "start single-threaded": one listener thread until your state store is thread-safe (§5).
spring.kafka.listener.concurrency=1

# --- Producer side (Phase 3 write-path: drone.commands.v1 + plan.events) ---
# Both key and value are plain strings. We serialize payloads to JSON ourselves with the
# Jackson 2 agent mapper (CommandPublisher / PlanPublisher) so the wire format is fully
# under our control and independent of spring-kafka's JsonSerializer Jackson version.
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
# acks=all: don't consider a record sent until the broker has durably replicated it.
spring.kafka.producer.acks=all

telemetry.log.sqlite.path=./data/telemetry-events.db

# Phase 4 high-throughput tuning.
# Two scheduled tasks run concurrently (batch WS broadcast + batch persistence flush); give
# the scheduler its own small pool so a slow DB flush never delays the broadcast tick.
spring.task.scheduling.pool.size=2
# Fixed-tick batched broadcast to clients (ms). ~50ms => 20 Hz.
telemetry.broadcast.tick-ms=50
# How often the persistence buffer drains to SQLite + Neo4j (ms).
telemetry.persistence.flush-ms=500

neo4j.uri=bolt://localhost:7687
neo4j.username=neo4j
neo4j.password=devpassword

# --- Agent / LLM provider (Phase 3 planner brain) ---
# Which LlmClient bean backs the planning agent:
#   stub      -> StubLlmClient, deterministic offline planner (default; no API key needed).
#   anthropic -> AnthropicLlmClient, real Claude via the Messages API (needs ANTHROPIC_API_KEY).
llm.provider=${LLM_PROVIDER:stub}
# Anthropic settings (only read when llm.provider=anthropic).
anthropic.api-key=${ANTHROPIC_API_KEY:}
# Default to Haiku 4.5 ($1/$5 per MTok, cheapest tier) for the planner; it handles this
# structured tool-use task well. Switch to claude-sonnet-5 for harder reasoning.
# Note: Haiku does NOT support adaptive thinking, so keep anthropic.thinking=disabled with it.
anthropic.model=${ANTHROPIC_MODEL:claude-haiku-4-5}
anthropic.base-url=https://api.anthropic.com/v1/messages
anthropic.version=2023-06-01
# Cost controls. Sonnet 5 enables "thinking" by default, billed at the output rate; the
# planner is a structured tool-use task, so thinking is disabled by default. Set to
# "adaptive" (with anthropic.effort low|medium|high|xhigh|max) to re-enable reasoning depth.
anthropic.thinking=${ANTHROPIC_THINKING:disabled}
anthropic.effort=${ANTHROPIC_EFFORT:low}
# Cache the identical-every-turn system prompt + tool specs across the multi-turn loop.
anthropic.prompt-cache=${ANTHROPIC_PROMPT_CACHE:true}